spring:
  application:
    name: template-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost:5432}/notification_db
    username: ${DB_USER:notif_user}
    password: ${DB_PASSWORD:notif_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${TEMPLATE_SERVICE_PORT:8081}

logging:
  level:
    root: INFO
    template: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enable: true
