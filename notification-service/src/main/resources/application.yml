spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:100}
      session-timeout-ms: ${KAFKA_SESSION_TIMEOUT_MS:30000}
      auto-offset-reset: earliest
      enable-auto-commit: false
      group-id: notif-svc
  datasource:
    url: ${DB_HOST:jdbc:postgresql://localhost:5432/notification?currentSchema=notification_schema}
    username: ${DB_USER:abhilash}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    default-schema: notification_schema
    change-log: classpath:db-changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: notification_schema
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
  jackson:
    serialization:
      write-dates-as-timestamps: false
  autoconfigure:
    exclude: []

retry:
  scheduler:
    interval-ms: ${RETRY_SCHEDULER_INTERVAL_MS:60000}
    initial-delay-ms: ${RETRY_SCHEDULER_INITIAL_DELAY_MS:30000}

server:
  port: ${SERVER_PORT:8001}

logging:
  level:
    root: INFO
    notification: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data: INFO

management:
  health:
    redis:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

sendgrid:
  api-key: ${SENDGRID_API_KEY:mock-key}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@notification-platform.com}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:mock-sid}
  auth-token: ${TWILIO_AUTH_TOKEN:mock-token}
  from-number: ${TWILIO_FROM_NUMBER:+1234567890}

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  project-id: ${FIREBASE_PROJECT_ID:mock-project}

webhook:
  timeout-ms: ${WEBHOOK_TIMEOUT_MS:5000}
  max-retries: ${WEBHOOK_MAX_RETRIES:1}

idempotency:
  ttl-hours: ${IDEMPOTENCY_TTL_HOURS:24}

template-service:
  enabled: ${TEMPLATE_SERVICE_ENABLED:true}
  base-url: ${TEMPLATE_SERVICE_URL:http://localhost:8002}
  endpoints:
    get-template: /api/v1/templates/{templateId}
    render-template: /api/v1/templates/{templateId}/render

delivery-tracker:
  enabled: ${DELIVERY_TRACKER_ENABLED:true}
  base-url: ${DELIVERY_TRACKER_URL:http://localhost:8003}
  endpoints:
    record-attempt: /api/v1/delivery-attempts
    failed-attempts: /api/v1/delivery-attempts/failed?since={since}&limit={limit}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

