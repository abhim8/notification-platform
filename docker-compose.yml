services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - notification-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    networks:
      - notification-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 5s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
      echo 'Creating Kafka topics...' &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic notification.transactional --partitions 6 --replication-factor 1 --config retention.ms=604800000 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic notification.marketing --partitions 3 --replication-factor 1 --config retention.ms=259200000 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic notification.alerts --partitions 6 --replication-factor 1 --config retention.ms=86400000 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic notification.retry --partitions 3 --replication-factor 1 --config retention.ms=172800000 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic notification.dlq --partitions 3 --replication-factor 1 --config retention.ms=1209600000 &&
      echo 'All topics created successfully!'
      "
    networks:
      - notification-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - notification-network

networks:
  notification-network:
    driver: bridge

